{{ block title }}{{ endblock }}

{{ block content }}
<link rel="stylesheet" href="{{ static 'css/css.css' }}">
<link rel="stylesheet" href="{{ static 'css/modal.css' }}">
<script type="text/javascript" src="{{ static 'js/Script_modal.js' }}"></script>

{{ include C.Part_II_Instructions_template }}

    <div class="buttons-container">
        <div class="Instructions">
            <a onclick="open_modal(1)" class="btn btn-info">Instructions</a>
        </div>
        <button id="NextButton" class="btn btn-primary">Next</button>
    </div>
</div>

<!-- Modal: general instructions -->
<div id="myModal1" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><span class="icon">📘</span> Instructions</h2>
            <span class="close" onclick="span_click(1)">&times;</span>
        </div>
        <div class="modal-body">
            {{ include C.Part_II_Instructions_template }}
        </div>
    </div>
</div>

{{ endblock }}
